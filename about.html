    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --robo-green: #a3ff00;
        }

        body {
            margin: 0; background: #050505;
            height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif;
        }

        .spline-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .top-video-frame {
            position: absolute; top: 10px; left: 45%;
            transform: translateX(-50%);
            width: 300px; height: 160px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            z-index: 10; overflow: hidden;
        }
        .top-video-frame video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .ui-wrapper {
            position: relative; z-index: 5;
            width: 100%; height: 100%;
            display: flex; justify-content: space-evenly;
            align-items: center; 
            padding: 0 5%; 
            pointer-events: none;
        }

        .side-column { 
            display: flex; flex-direction: column; gap: 15px; 
            justify-content: center;
        }

        .glass-card {
            pointer-events: auto; width: 220px; padding: 15px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 22px;
            text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-card:hover { 
            transform: scale(1.07);
            border-color: var(--robo-green);
            background: rgba(255, 255, 255, 0.15);
        }

        .profile-pic {
            width: 55px; height: 55px; border-radius: 50%;
            margin: 0 auto 10px; border: 2px solid var(--robo-green);
            overflow: hidden; background: #111;
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .glass-card h3 { color: #fff; margin: 5px 0; font-size: 0.95rem; }
        .glass-card p { color: var(--robo-green); font-size: 0.75rem; margin-bottom: 1px; }

        .social-box { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .social-box a {
            color: #ccc; font-size: 14px; width: 32px; height: 32px;
            background: rgba(255,255,255,0.08); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
        }
        .social-box a:hover { color: #fff; transform: translateY(-3px); border-color: var(--robo-green); }
        
        /* --- كود الزرار المعدل --- */
        .uiverse-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: auto;
            text-decoration: none;

            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--robo-green);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 0px 20px rgba(163, 255, 0, 0.15);
            cursor: pointer;
            transition-duration: .3s;
            overflow: hidden;
        }

        .uiverse-btn .svgIcon {
            width: 16px;
            transition-duration: .3s;
            fill: var(--robo-green);
        }

        .uiverse-btn:hover {
            width: 150px;
            border-radius: 50px;
            transition-duration: .3s;
            background-color: var(--robo-green);
            align-items: center;
            box-shadow: 0px 0px 30px rgba(163, 255, 0, 0.4);
        }

        .uiverse-btn:hover .svgIcon {
            width: 50px;
            transition-duration: .3s;
            transform: translateY(60%);
            opacity: 0;
        }

        .uiverse-btn::before {
            position: absolute;
            top: -20px;
            content: "المشروع";
            color: #000;
            transition-duration: .3s;
            font-size: 2px;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }

        .uiverse-btn:hover::before {
            font-size: 15px;
            opacity: 1;
            transform: translateY(31px); /* بيظبط الكلمة في النص بالظبط */
            transition-duration: .3s;
        }
    </style>
</head>
